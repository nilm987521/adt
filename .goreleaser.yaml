version: 2

project_name: adt

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: adt
    main: ./cmd/adt
    binary: adt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: adt
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

homebrew_casks:
  - repository:
      owner: nilm987521
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    name: adt
    ids:
      - adt
    homepage: https://github.com/nilm987521/adt
    description: Safe read-only database CLI for AI agents
    commit_author:
      name: goreleaser-bot
      email: goreleaser@nilm987521

scoops:
  - repository:
      owner: nilm987521
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    ids:
      - adt
    homepage: https://github.com/nilm987521/adt
    description: Safe read-only database CLI for AI agents
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: goreleaser@nilm987521

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: '^feat'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^fix'
      order: 1
    - title: 'Other Changes'
      order: 999

release:
  github:
    owner: nilm987521
    name: adt
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

announce:
  skip: true
