name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BINARY=adt
          if [ "$GOOS" = "windows" ]; then
            BINARY=adt.exe
          fi
          go build -trimpath -o "dist/$BINARY" ./cmd/adt

      - name: Package archive
        run: |
          cp README.md dist/
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "adt_${GOOS}_${GOARCH}.zip" "adt.exe" "README.md"
          else
            tar czf "adt_${GOOS}_${GOARCH}.tar.gz" "adt" "README.md"
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: adt_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
